version: '3.9'

services:
  # ─── Application ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: builder   # Use builder stage for hot-reload in dev
    container_name: zorvyn-api
    command: npm run dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: file:./prisma/dev.db
      JWT_SECRET: local_dev_secret_change_in_production_at_least_32_chars
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: debug
    volumes:
      - .:/app
      - /app/node_modules   # Preserve node_modules from image
    depends_on:
      - mailhog
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Mail Catcher (dev email testing) ──────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: zorvyn-mail
    ports:
      - '8025:8025'   # Web UI
      - '1025:1025'   # SMTP
    restart: unless-stopped

networks:
  default:
    name: zorvyn-network
